<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Straddle Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<style>
  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --orange: #f59e0b;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.1), 0 4px 8px rgba(0,0,0,0.04);
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 1440px; margin: auto; }

  /* ─── Header ─── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .header h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .status-indicator {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    background: var(--card);
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }

  /* ─── Controls ─── */
  .controls {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .control-group label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
  }
  select, input {
    padding: 9px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    cursor: pointer;
  }
  select:hover, input:hover { border-color: var(--blue); }
  select:focus, input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }

  /* ─── Chart Container ─── */
  #chart {
    position: relative;
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    margin-bottom: 24px;
    overflow: hidden;
  }

  /* ─── On-screen watermark: URL (center) ─── */
  #chart::before {
    content: "https://192.168.0.121:8000";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.4rem, 4vw, 3rem);
    font-weight: 700;
    color: rgba(0,0,0,0.06);
    pointer-events: none;
    z-index: 1;
    letter-spacing: 1px;
  }

  /* ─── On-screen watermark: Chart name (bottom) ─── */
  #chart::after {
    content: attr(data-watermark);
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(1.2rem, 3vw, 2rem);
    font-weight: 800;
    color: rgba(0,0,0,0.07);
    pointer-events: none;
    z-index: 1;
    white-space: nowrap;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Ensure chart SVG renders above watermarks */
  #chart .apexcharts-canvas { position: relative; z-index: 2; }

  /* ─── Metric Cards ─── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .metric-card {
    background: var(--card);
    padding: 18px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .metric-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .metric-card h4 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .metric-card p {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
</style>

ly="Helvetica, Arial, sans-serif" font-weight="400" fill="#0f172a" class="apexcharts-text apexcharts-yaxis-label " style="font-family: Helvetica, Arial, sans-serif;"><tspan>2</tspan><title>2</title></text><text x="20" y="398.83333333333326" text-anchor="end" dominant-baseline="auto" font-size="11px" font-family="Helvetica, Arial, sans-serif" font-weight="400" fill="#0f172a" class="apexcharts-text apexcharts-yaxis-label " style="font-family: Helvetica, Arial, sans-serif;"><tspan>1</tspan><title>1</title></text><text x="20" y="471.86666666666656" text-anchor="end" dominant-baseline="auto" font-size="11px" font-family="Helvetica, Arial, sans-serif" font-weight="400" fill="#0f172a" class="apexcharts-text apexcharts-yaxis-label " style="font-family: Helvetica, Arial, sans-serif;"><tspan>0</tspan><title>0</title></text></g></g><title>Chart</title></svg><div class="apexcharts-legend" style="max-height: 250px;"></div></div></div>

    <div class="metric-card"><h4>Straddle LTP</h4><p id="straddleLTP">--</p></div>
    <div class="metric-card"><h4>Call LTP</h4><p id="callLTP">--</p></div>
    <div class="metric-card"><h4>Put LTP</h4><p id="putLTP">--</p></div>
    <div class="metric-card"><h4>Total Volume</h4><p id="volume">--</p></div>
    <div class="metric-card"><h4>Last Update</h4><p id="lastUpdate">--</p></div>

<script>
let chart, polling = null, rawData = [], tooltipTimeout = null;
let previousResponseSig = null;
const HOVER_TOOLTIP_DURATION = 1000;
const MENU_ACTION_DELAY = 1000;
let suppressImmediateFetch = false;
let indexChangeTimeout = null;

function round2(val) { return Number(parseFloat(val).toFixed(2)); }

function getTradingDate() {
  const d = new Date();
  const day = d.getDay();
  if (day === 0) d.setDate(d.getDate() - 2);
  else if (day === 6) d.setDate(d.getDate() - 1);
  return d.toISOString().split("T")[0];
}

function formatDateTime(ts) {
  return new Date(ts * 1000).toLocaleString("en-IN", {
    day: "2-digit", month: "short", year: "numeric",
    hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true
  });
}

function attachChartEvents() {
  if (!chart) return;
  chart.updateOptions({
    chart: {
      events: {
        dataPointMouseEnter: function() {
          if (tooltipTimeout) clearTimeout(tooltipTimeout);
          const tip = document.querySelector('#chart .apexcharts-tooltip');
          if (tip) tip.style.display = '';
          tooltipTimeout = setTimeout(() => {
            const t = document.querySelector('#chart .apexcharts-tooltip');
            if (t) t.style.display = 'none';
          }, HOVER_TOOLTIP_DURATION);
        },
        dataPointMouseLeave: function() {
          if (tooltipTimeout) { clearTimeout(tooltipTimeout); tooltipTimeout = null; }
          const tip = document.querySelector('#chart .apexcharts-tooltip');
          if (tip) tip.style.display = '';
        }
      }
    }
  });
}

function initChart() {
  chart = new ApexCharts(document.querySelector("#chart"), {
    chart: {
      type: 'line',
      height: 500,
      zoom: { enabled: true },
      animations: { enabled: false },
      toolbar: {
        show: true,
        tools: {
          download: true, selection: true, zoom: true,
          zoomin: true, zoomout: true, pan: true, reset: true
        }
      }
    },
    stroke: { curve: 'straight', width: 2 },
    grid: { padding: { right: 15, left: 10 } },
    colors: ['#3b82f6'],
    series: [{ data: [] }],
    yaxis: {
      labels: { style: { colors: '#0f172a' } }
    },
    xaxis: {
      type: 'datetime',
      labels: {
        formatter: function (value) {
          return new Date(value).toLocaleTimeString("en-IN", {
            hour: "2-digit", minute: "2-digit", hour12: true, timeZone: "Asia/Kolkata"
          });
        }
      }
    },
    tooltip: {
      custom: function ({ dataPointIndex }) {
        const d = rawData[dataPointIndex];
        if (!d) return '';
        return `<div style="padding:12px;background:#fff;color:#0f172a;border:1px solid #e2e8f0;border-radius:10px;min-width:260px;font-size:13px;line-height:1.6;">
          <b>${formatDateTime(d.time)}</b><hr style="border-color:#e2e8f0;margin:6px 0;"/>
          <div><b style="color:#f59e0b">Straddle</b></div>
          O:${round2(d.straddle.open)} H:${round2(d.straddle.high)} L:${round2(d.straddle.low)} C:${round2(d.straddle.close)} V:${d.straddle.volume}<hr style="border-color:#e2e8f0;margin:6px 0;"/>
          <div><b style="color:#3b82f6">Call</b></div>
          O:${round2(d.call.open)} H:${round2(d.call.high)} L:${round2(d.call.low)} C:${round2(d.call.close)} V:${d.call.volume}<hr style="border-color:#e2e8f0;margin:6px 0;"/>
          <div><b style="color:#22c55e">Put</b></div>
          O:${round2(d.put.open)} H:${round2(d.put.high)} L:${round2(d.put.low)} C:${round2(d.put.close)} V:${d.put.volume}
        </div>`;
      }
    }
  });
  chart.render();
  attachChartEvents();
}

function updatePriceBox(chart, value) {
  chart.clearAnnotations();
  const price = round2(value);
  chart.addYaxisAnnotation({
    y: price, yAxisIndex: 0, strokeDashArray: 4, borderColor: '#ef4444',
    label: {
      text: `₹ ${price.toFixed(2)}`, position: "right", borderColor: '#ef4444',
      style: {
        background: '#ef4444', color: '#fff', fontSize: '12px', fontWeight: 600,
        padding: { left: 8, right: 8, top: 4, bottom: 4 }
      }
    }
  });
}

async function fetchData() {
  if (suppressImmediateFetch) return;
  const tradingDate = getTradingDate();
  const payload = {
    category: "equity", index: document.getElementById('index').value,
    from_date: tradingDate, to_date: tradingDate
  };
  const res = await fetch("/api/straddle", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const result = await res.json();
  if (result.status !== "success") return;

  const newSig = document.getElementById('index').value + '|' + JSON.stringify(result.data || []);
  if (newSig === previousResponseSig) return;
  previousResponseSig = newSig;

  rawData = result.data;
  if (!rawData.length) return;

  const maxHigh = Math.max(...rawData.map(d => d.straddle.close));
  const minLow = Math.min(...rawData.map(d => d.straddle.close));
  chart.updateOptions({ yaxis: { min: minLow, max: maxHigh } });

  const seriesData = rawData.map(c => ({ x: c.time * 1000, y: round2(c.straddle.close) }));
  chart.updateSeries([{ data: seriesData }]);
  try { attachChartEvents(); } catch (e) {}

  const latest = rawData[rawData.length - 1];
  document.getElementById('straddleLTP').innerText = round2(latest.straddle.close).toFixed(2);
  document.getElementById('callLTP').innerText = round2(latest.call.close).toFixed(2);
  document.getElementById('putLTP').innerText = round2(latest.put.close).toFixed(2);
  document.getElementById('volume').innerText = latest.straddle.volume;
  document.getElementById('lastUpdate').innerText = formatDateTime(latest.time);
  updatePriceBox(chart, latest.straddle.close);
}

function updateClock() {
  document.getElementById('headerClock').textContent = new Date().toLocaleString('en-IN', {
    day:'2-digit', month:'short', year:'numeric',
    hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true
  });
}

setInterval(updateClock, 1000);
updateClock();
initChart();
fetchData();

const indexEl = document.getElementById('index');
const chartEl = document.getElementById('chart');
chartEl.dataset.watermark = indexEl.options[indexEl.selectedIndex].text;

indexEl.addEventListener('change', () => {
  chartEl.dataset.watermark = indexEl.options[indexEl.selectedIndex].text;
  if (indexChangeTimeout) clearTimeout(indexChangeTimeout);
  fetchData();
  suppressImmediateFetch = true;
  indexChangeTimeout = setTimeout(() => {
    suppressImmediateFetch = false;
    indexChangeTimeout = null;
  }, MENU_ACTION_DELAY);
});

polling = setInterval(fetchData, 2000);

// ─── PNG Export with corrected watermarks ───
document.addEventListener('click', async (e) => {
  if (e.target.classList.contains('apexcharts-menu-item') && e.target.classList.contains('exportPNG')) {
    e.preventDefault();
    e.stopPropagation();
    await exportChartWithWatermarks();
  }
}, true);

async function exportChartWithWatermarks() {
  if (!chart) return;
  try {
    const data = await chart.dataURI();
    const imgURI = (data && data.imgURI) ? data.imgURI : data;

    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      const paddingTop = 60;
      const paddingBottom = 80;
      const paddingX = 40;

      const canvas = document.createElement('canvas');
      canvas.width = img.width + paddingX * 2;
      canvas.height = img.height + paddingTop + paddingBottom;
      const ctx = canvas.getContext('2d');

      // Background
      ctx.fillStyle = '#f0f4f8';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw chart image centered with padding
      ctx.drawImage(img, paddingX, paddingTop, img.width, img.height);

      // ─── URL watermark (centered over chart area) ───
      ctx.save();
      ctx.globalAlpha = 0.12;
      ctx.fillStyle = '#000';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const urlFontSize = Math.max(20, Math.round(img.width * 0.045));
      ctx.font = `bold ${urlFontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
      ctx.fillText('https://192.168.0.121:8000', canvas.width / 2, paddingTop + img.height / 2);
      ctx.restore();

      // ─── Chart name watermark (bottom area) ───
      const indexElLocal = document.getElementById('index');
      const name = indexElLocal ? indexElLocal.options[indexElLocal.selectedIndex].text : 'Chart';

      ctx.save();
      const nameFontSize = Math.max(18, Math.round(img.width * 0.04));
      ctx.font = `800 ${nameFontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const nameY = paddingTop + img.height + paddingBottom / 2;
      const textMetrics = ctx.measureText(name.toUpperCase());
      const boxPadX = 20;
      const boxPadY = 10;
      const boxW = textMetrics.width + boxPadX * 2;
      const boxH = nameFontSize + boxPadY * 2;

      // Background pill for name
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = '#000';
      const boxR = 8;
      const bx = canvas.width / 2 - boxW / 2;
      const by = nameY - boxH / 2;
      ctx.beginPath();
      ctx.roundRect(bx, by, boxW, boxH, boxR);
      ctx.fill();

      // Name text
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#000';
      ctx.fillText(name.toUpperCase(), canvas.width / 2, nameY);
      ctx.restore();

      // Trigger download
      const link = document.createElement('a');
      link.download = `${name.replace(/\s+/g, '_')}_${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    };
    img.src = imgURI;
  } catch (e) {
    console.error('Export with watermarks failed', e);
  }
}
</script>
